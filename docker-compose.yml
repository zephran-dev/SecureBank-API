version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: securebank-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securebank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securebank_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-securebank_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securebank -d securebank_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
